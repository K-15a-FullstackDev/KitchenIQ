name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Use Node 14 (2021 LTS)
        uses: actions/setup-node@v2
        with:
          node-version: "14"

      - name: Install
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Test (with coverage ≥80%)
        run: npm test -- --coverage
